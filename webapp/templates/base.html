<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or 'Switch Control Plane' }}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <a href="/ui" class="brand">Switch Control Plane</a>
    {% if user %}
    <div class="topbar-right">
      <span class="muted">{{ user.username }} ({{ user.role.name if user.role else 'viewer' }})</span>
      <form method="post" action="/ui/logout">
        <button type="submit">Logout</button>
      </form>
    </div>
    {% endif %}
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>

services:
  switch-control-plane:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-python:3.11-slim}
    container_name: switch-control-plane
    network_mode: host
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
